name: Rust

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Install System Dependencies (Crucial for Tauri)
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf

    # 2. Cache Rust Dependencies (Speeds up subsequent runs)
    - name: Rust Cache
      uses: swatinem/rust-cache@v2

    # 3. Pre-install Tooling
    - name: Install Trunk
      run: cargo install trunk --locked

    # 4. Explicitly Download/Fetch Dependencies
    # This ensures everything is local before the build starts
    - name: cargo fetch
      run: cargo fetch

    - name: Build Tauri backend
      run: cargo tauri build
   
    - name: Run Tauri backend tests
      run: cargo test -p hazel --verbose
