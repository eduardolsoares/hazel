name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build Tauri backend
      run: cargo build -p hazel --verbose
    - name: Run Tauri backend tests
      run: cargo test -p hazel --verbose
